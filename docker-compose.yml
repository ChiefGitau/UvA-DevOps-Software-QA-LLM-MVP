services:
  frontend:
    build:
      context: ./services/frontend
    ports:
      - "80:80"
    depends_on:
      session-service:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
      llm-service:
        condition: service_healthy
    networks:
      - app-network

  session-service:
    build:
      context: ./services/session
    environment:
      - DATA_DIR=/app/data
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  analysis-service:
    build:
      context: ./services/analysis
    environment:
      - DATA_DIR=/app/data
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  llm-service:
    build:
      context: ./services/llm
    environment:
      - DATA_DIR=/app/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-data:
