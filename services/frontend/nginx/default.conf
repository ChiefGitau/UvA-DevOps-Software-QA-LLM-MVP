server {
    listen 80;

    # Use AWS VPC DNS resolver with short TTL so nginx re-resolves
    # Cloud Map names dynamically instead of caching them at startup
    resolver 169.254.169.253 valid=10s;

    # Serve the UI
    location / {
        root /usr/share/nginx/html/templates;
        index index.html;
        try_files $uri $uri/ /index.html =404;
    }

    # Serve static assets
    location /static/ {
        root /usr/share/nginx/html;
    }

    # Analysis Report endpoint (lives in analysis service)
    location ~ ^/api/session/.*/report$ {
        set $analysis_upstream http://analysis-service.svc:8000;
        proxy_pass $analysis_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Session Service endpoints
    location /api/session/ {
        set $session_upstream http://session-service.svc:8000;
        proxy_pass $session_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Analysis Service endpoints
    location /api/analyse {
        set $analysis_upstream http://analysis-service.svc:8000;
        proxy_pass $analysis_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analyzers {
        set $analysis_upstream http://analysis-service.svc:8000;
        proxy_pass $analysis_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # LLM Service endpoints (Repair & Verify)
    location /api/llm/ {
        set $llm_upstream http://llm-service.svc:8000;
        proxy_pass $llm_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/repair/ {
        set $llm_upstream http://llm-service.svc:8000;
        proxy_pass $llm_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/verify/ {
        set $llm_upstream http://llm-service.svc:8000;
        proxy_pass $llm_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check for Nginx itself (optional)
    location /nginx_status {
        stub_status;
    }
}
