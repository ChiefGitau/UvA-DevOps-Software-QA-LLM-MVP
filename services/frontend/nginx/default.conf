server {
    listen 80;

    # Serve the UI
    location / {
        root /usr/share/nginx/html/templates;
        index index.html;
        try_files $uri $uri/ /index.html =404;
    }

    # Serve static assets
    location /static/ {
        root /usr/share/nginx/html;
    }

    # Analysis Report endpoint (lives in analysis service)
    location ~ ^/api/session/.*/report$ {
        proxy_pass http://analysis-service.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Session Service endpoints
    location /api/session/ {
        proxy_pass http://session-service.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Analysis Service endpoints
    location /api/analyse {
        proxy_pass http://analysis-service.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analyzers {
        proxy_pass http://analysis-service.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # LLM Service endpoints (Repair & Verify)
    location /api/llm/ {
        proxy_pass http://llm-service.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/repair/ {
        proxy_pass http://llm-service.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/verify/ {
        proxy_pass http://llm-service.svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check for Nginx itself (optional)
    location /nginx_status {
        stub_status;
    }
}
