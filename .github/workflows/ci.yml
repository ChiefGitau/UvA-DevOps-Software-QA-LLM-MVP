name: CI – Lint & Test

on:
  push:
    branches: [development, main, QALLM24-AWS]
  pull_request:
    branches: [development, main, QALLM24-AWS]

permissions:
  contents: read

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check services/

      - name: Run ruff format check
        run: ruff format --check services/

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run Session Service tests
        run: |
          cd services/session
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ --cov=app --cov-report=term-missing --tb=short

      - name: Run LLM Service tests
        run: |
          cd services/llm
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ --cov=app --cov-report=term-missing --tb=short

      - name: Run LLM Agent Service tests
        run: |
          cd services/llm-agent
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ --cov=app --cov-report=term-missing --tb=short

      - name: Run Analysis Service tests
        run: |
          cd services/analysis
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
          # Analysis tools needed for tests
          pip install bandit ruff radon
          # Note: trufflehog is skipped in CI unless installed
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ --cov=app --cov-report=term-missing --tb=short
