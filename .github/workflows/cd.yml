name: CD – Build & Deploy

on:
  workflow_run:
    workflows: ["CI – Lint & Test"]
    types: [completed]
    branches: [QALLM24-AWS]

# Only one deploy can run at a time per branch.
# If a new commit is pushed while a deploy is running, the old one is cancelled.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/chiefgitau/uva-devops-software-qa-llm-mvp
  ECS_CLUSTER: qallm-mvp-cluster
  AWS_REGION: eu-north-1

# ── Build jobs (run in parallel) ──────────────────────────────────────────────

jobs:
  build-frontend:
    name: Build & Push Frontend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.IMAGE_BASE }}-frontend:${{ github.sha }}

  build-session:
    name: Build & Push Session Service
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/session
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-session:latest
            ${{ env.IMAGE_BASE }}-session:${{ github.sha }}

  build-analysis:
    name: Build & Push Analysis Service
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/analysis
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-analysis:latest
            ${{ env.IMAGE_BASE }}-analysis:${{ github.sha }}

  build-llm:
    name: Build & Push LLM Service
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/llm
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-llm:latest
            ${{ env.IMAGE_BASE }}-llm:${{ github.sha }}

  build-llm-agent:
    name: Build & Push LLM Agent Service
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/llm-agent
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-llm-agent:latest
            ${{ env.IMAGE_BASE }}-llm-agent:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}-llm-agent:cache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}-llm-agent:cache,mode=max

# ── Deploy job (runs after all builds succeed) ────────────────────────────────

  deploy:
    name: Deploy to AWS
    needs: [build-frontend, build-session, build-analysis, build-llm, build-llm-agent]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: qallm-mvp-stack
          template: aws/cloudformation.yaml
          no-fail-on-empty-changeset: "1"
          capabilities: CAPABILITY_NAMED_IAM
          parameter-overrides: >-
            OpenAIApiKey=${{ secrets.OPENAI_API_KEY }},
            AnthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }},
            OllamaBaseUrl=${{ secrets.OLLAMA_BASE_URL }},
            GitHubUsername=chiefgitau,
            GitHubToken=${{ secrets.PAT }},
            ImageTag=${{ github.event.workflow_run.head_sha }}