name: CD – Build & Deploy

on:
  push:
    branches: [QALLM24-AWS]
  workflow_run:
    workflows: ["CI – Lint & Test"]
    types: [completed]
    branches: [QALLM24-AWS]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build and Push to GHCR
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and Push services using fixed tags to ensure lower-case
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: ghcr.io/chiefgitau/uva-devops-software-qa-llm-mvp-frontend:latest

      - name: Build and push Session Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/session
          push: true
          tags: ghcr.io/chiefgitau/uva-devops-software-qa-llm-mvp-session:latest

      - name: Build and push Analysis Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/analysis
          push: true
          tags: ghcr.io/chiefgitau/uva-devops-software-qa-llm-mvp-analysis:latest

      - name: Build and push LLM Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/llm
          push: true
          tags: ghcr.io/chiefgitau/uva-devops-software-qa-llm-mvp-llm:latest

      # Authenticate with AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # Deploy/Update Infrastructure with CloudFormation
      - name: Deploy CloudFormation Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: qallm-mvp-stack
          template: aws/cloudformation.yaml
          no-fail-on-empty-changeset: "1"
          capabilities: CAPABILITY_NAMED_IAM
          parameter-overrides: >-
            OpenAIApiKey=${{ secrets.OPENAI_API_KEY }},
            AnthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }},
            OllamaBaseUrl=${{ secrets.OLLAMA_BASE_URL }},
            GitHubUsername=chiefgitau,
            GitHubToken=${{ secrets.PAT }}

      # Force ECS to pull the new 'latest' images from GHCR
      - name: Force ECS Redeployment
        run: |
          aws ecs update-service --cluster qallm-mvp-cluster --service frontend --force-new-deployment
          aws ecs update-service --cluster qallm-mvp-cluster --service session-service --force-new-deployment
          aws ecs update-service --cluster qallm-mvp-cluster --service analysis-service --force-new-deployment
          aws ecs update-service --cluster qallm-mvp-cluster --service llm-service --force-new-deployment
